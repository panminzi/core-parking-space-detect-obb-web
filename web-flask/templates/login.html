<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>登录 - 智慧交通停车位检测系统</title>
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <script src="https://unpkg.com/element-plus@2.4.1/dist/index.full.js"></script>
    <script src="https://unpkg.com/@element-plus/icons-vue@2.1.0/dist/index.iife.min.js"></script>
    <link rel="stylesheet" href="https://unpkg.com/element-plus@2.4.1/dist/index.css">
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', 'Oxygen', 'Ubuntu', 'Cantarell', 'Fira Sans', 'Droid Sans', 'Helvetica Neue', sans-serif;
            background: linear-gradient(135deg, #f8fafc 0%, #f1f5f9 50%, #e2e8f0 100%);
            min-height: 100vh;
            overflow: hidden;
        }
        
        .login-container {
            width: 100%;
            height: 100vh;
            display: flex;
        }
        
        .left-section {
            flex: 1;
            background: url('./images/login-bg.jpg') center center no-repeat;
            background-size: cover;
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .left-section::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: linear-gradient(135deg, rgba(96, 165, 250, 0.15) 0%, rgba(59, 130, 246, 0.12) 50%, rgba(37, 99, 235, 0.08) 100%);
        }
        
        .left-content {
            position: relative;
            z-index: 2;
            text-align: center;
            color: white;
            max-width: 500px;
            padding: 40px;
            background: rgba(255, 255, 255, 0.18);
            border-radius: 16px;
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.3);
            box-shadow: 0 12px 40px rgba(0, 0, 0, 0.3);
        }
        
        .left-title {
            font-size: 3rem;
            font-weight: 700;
            margin-bottom: 20px;
            text-shadow: 2px 2px 8px rgba(0, 0, 0, 0.8), 0 0 20px rgba(0, 0, 0, 0.6);
            color: white;
        }
        
        .left-subtitle {
            font-size: 1.2rem;
            opacity: 0.95;
            line-height: 1.6;
            margin-bottom: 30px;
            text-shadow: 1px 1px 6px rgba(0, 0, 0, 0.7), 0 0 15px rgba(0, 0, 0, 0.5);
        }
        
        .left-features {
            display: flex;
            flex-direction: column;
            gap: 15px;
            text-align: left;
        }
        
        .feature-item {
            display: flex;
            align-items: center;
            gap: 12px;
            font-size: 1rem;
            text-shadow: 1px 1px 4px rgba(0, 0, 0, 0.6);
            padding: 8px 12px;
            background: rgba(255, 255, 255, 0.15);
            border-radius: 8px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            transition: all 0.3s ease;
        }
        
        .feature-item:hover {
            background: rgba(255, 255, 255, 0.25);
            transform: translateY(-2px);
            box-shadow: 0 4px 16px rgba(0, 0, 0, 0.2);
        }
        
        .feature-icon {
            width: 24px;
            height: 24px;
            background: rgba(96, 165, 250, 0.6);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 12px;
            border: 1px solid rgba(255, 255, 255, 0.4);
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.3);
        }
        
        .right-section {
            width: 420px;
            background: white;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 32px;
            box-shadow: -10px 0 30px rgba(0, 0, 0, 0.1);
        }
        
        .login-box {
            width: 100%;
            max-width: 400px;
            text-align: center;
        }
        
        .login-title {
            font-size: 24px;
            font-weight: 600;
            color: #1e293b;
            margin-bottom: 8px;
        }
        
        .logo-container {
            margin-bottom: 20px;
            text-align: center;
        }
        
        .logo-image {
            width: 60px;
            height: 60px;
            border-radius: 50%;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.1);
            margin-bottom: 10px;
        }
        
        .login-subtitle {
            font-size: 14px;
            color: #909399;
            margin-bottom: 32px;
        }
        
        .form-container {
            text-align: left;
        }
        
        .el-form-item {
            margin-bottom: 24px;
        }
        
        .el-input {
            border-radius: 8px;
        }
        
        .login-btn {
            width: 100%;
            height: 48px;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 500;
            background: linear-gradient(135deg, #60a5fa 0%, #3b82f6 100%);
            border: none;
            margin-bottom: 20px;
            transition: all 0.3s ease;
            color: white;
        }
        
        .login-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(96, 165, 250, 0.35);
            background: linear-gradient(135deg, #3b82f6 0%, #2563eb 100%);
        }
        
        .switch-mode {
            text-align: center;
            margin-top: 20px;
        }
        
        .switch-link {
            color: #60a5fa;
            cursor: pointer;
            font-size: 14px;
            text-decoration: none;
            transition: color 0.3s ease;
        }
        
        .switch-link:hover {
            color: #3b82f6;
        }
        
        .demo-info {
            background: linear-gradient(135deg, rgba(239, 246, 255, 0.9) 0%, rgba(219, 234, 254, 0.7) 100%);
            border-radius: 8px;
            padding: 16px;
            margin-top: 24px;
            font-size: 12px;
            color: #3b82f6;
            border: 1px solid rgba(96, 165, 250, 0.3);
            line-height: 1.5;
        }
        
        .demo-accounts {
            display: flex;
            justify-content: space-between;
            margin-top: 8px;
        }
        
        .demo-account {
            background: rgba(255, 255, 255, 0.8);
            padding: 6px 12px;
            border-radius: 4px;
            font-size: 11px;
            color: #666;
        }
        
        @media (max-width: 1024px) {
            .login-container {
                flex-direction: column;
            }
            
            .left-section {
                height: 40vh;
                min-height: 300px;
            }
            
            .right-section {
                width: 100%;
                height: 60vh;
                padding: 20px;
            }
            
            .left-title {
                font-size: 2rem;
            }
            
            .left-subtitle {
                font-size: 1rem;
            }
        }
        
        @media (max-width: 480px) {
            .left-section {
                height: 35vh;
                min-height: 250px;
            }
            
            .right-section {
                height: 65vh;
                padding: 15px;
            }
            
            .left-title {
                font-size: 1.5rem;
            }
            
            .left-subtitle {
                font-size: 0.9rem;
            }
            
            .demo-accounts {
                flex-direction: column;
                gap: 8px;
            }
        }
    </style>
</head>
<body>
    <div id="app">
        <div class="login-container">
            <!-- 左侧背景区域 -->
            <div class="left-section">
                <div class="left-content">
                    <h1 class="left-title">智慧停车位检测系统</h1>
                    <p class="left-subtitle">基于YOLO11-OBB深度学习技术的停车位智能检测平台，支持实时识别停车位占用状态</p>
                    <div class="left-features">
                        <div class="feature-item">
                            <div class="feature-icon">🌿</div>
                            <span>停车位状态识别</span>
                        </div>
                        <div class="feature-item">
                            <div class="feature-icon">🧠</div>
                            <span>深度学习诊断</span>
                        </div>
                        <div class="feature-item">
                            <div class="feature-icon">📊</div>
                            <span>停车位检测</span>
                        </div>
                        <div class="feature-item">
                            <div class="feature-icon">⚡</div>
                            <span>多目标定位</span>
                        </div>
                    </div>
                </div>
            </div>
            
            <!-- 右侧登录区域 -->
            <div class="right-section">
                <div class="login-box">
                    <div class="logo-container">
                        <img src="./images/logo.png" alt="Logo" class="logo-image" />
                    </div>
                    <h1 class="login-title">欢迎使用</h1>
                    <p class="login-subtitle">{{ subtitleText }}</p>
                
                <div class="form-container">
                    <!-- 登录表单 -->
                    <el-form v-if="!isRegister" @submit.prevent="handleLogin">
                        <el-form-item>
                            <el-input
                                v-model="loginForm.username"
                                placeholder="用户名"
                                size="large"
                                clearable
                            >
                                <template #prefix>
                                    <span style="font-size: 16px;">👤</span>
                                </template>
                            </el-input>
                        </el-form-item>
                        <el-form-item>
                            <el-input
                                v-model="loginForm.password"
                                type="password"
                                placeholder="密码"
                                size="large"
                                show-password
                                @keyup.enter="handleLogin"
                            >
                                <template #prefix>
                                    <span style="font-size: 16px;">🔒</span>
                                </template>
                            </el-input>
                        </el-form-item>
                        <el-form-item>
                            <el-button
                                type="primary"
                                :loading="loginLoading"
                                class="login-btn"
                                @click="handleLogin"
                            >
                                {{ loginLoading ? '登录中...' : '登录' }}
                            </el-button>
                        </el-form-item>
                    </el-form>
                    
                    <!-- 注册表单 -->
                    <el-form v-else @submit.prevent="handleRegister">
                        <el-form-item>
                            <el-input
                                v-model="registerForm.username"
                                placeholder="用户名（至少3位）"
                                size="large"
                                clearable
                            >
                                <template #prefix>
                                    <span style="font-size: 16px;">👤</span>
                                </template>
                            </el-input>
                        </el-form-item>
                        <el-form-item>
                            <el-input
                                v-model="registerForm.password"
                                type="password"
                                placeholder="密码（至少6位）"
                                size="large"
                                show-password
                            >
                                <template #prefix>
                                    <span style="font-size: 16px;">🔒</span>
                                </template>
                            </el-input>
                        </el-form-item>
                        <el-form-item>
                            <el-input
                                v-model="registerForm.realName"
                                placeholder="真实姓名（可选）"
                                size="large"
                                clearable
                                @keyup.enter="handleRegister"
                            >
                                <template #prefix>
                                    <span style="font-size: 16px;">🤖</span>
                                </template>
                            </el-input>
                        </el-form-item>
                        <el-form-item>
                            <el-button
                                type="success"
                                :loading="registerLoading"
                                class="login-btn"
                                @click="handleRegister"
                            >
                                {{ registerLoading ? '注册中...' : '注册' }}
                            </el-button>
                        </el-form-item>
                    </el-form>
                    
                    <div class="switch-mode">
                        <span class="switch-link" @click="toggleMode">
                            {{ switchText }}
                        </span>
                    </div>
                </div>
                
                <div class="demo-info">
                    <div>💡 演示账户</div>
                    <div class="demo-accounts">
                        <div class="demo-account">admin / 123456</div>
                        <div class="demo-account">user / 123456</div>
                    </div>
                </div>
            </div>
        </div>
    </div>
    </div>

    <script>
        // API配置
        const API_CONFIG = {
            baseURL: 'http://localhost:5011',  // 可以根据需要修改host和port
            endpoints: {
                login: '/api/user/login',
                register: '/api/user/register'
            }
        };

        // 用户缓存管理
        const UserCache = {
            // 缓存键名
            USER_KEY: 'yyxz_core_user_info',
            
            // 保存用户信息到缓存
            saveUser(userInfo) {
                localStorage.setItem(this.USER_KEY, JSON.stringify(userInfo));
            },
            
            // 从缓存获取用户信息
            getUser() {
                const userStr = localStorage.getItem(this.USER_KEY);
                return userStr ? JSON.parse(userStr) : null;
            },
            
            // 清除用户缓存
            clearUser() {
                localStorage.removeItem(this.USER_KEY);
            },
            
            // 检查是否已登录
            isLoggedIn() {
                return !!this.getUser();
            }
        };

        const { createApp } = Vue;
        const { ElMessage } = ElementPlus;

        createApp({
            data() {
                return {
                    isRegister: false,
                    loginLoading: false,
                    registerLoading: false,
                    loginForm: {
                        username: '',
                        password: ''
                    },
                    registerForm: {
                        username: '',
                        password: '',
                        realName: ''
                    }
                };
            },
            computed: {
                subtitleText() {
                    return this.isRegister ? '创建新账户' : '登录到您的账户';
                },
                switchText() {
                    return this.isRegister ? '已有账户？立即登录' : '没有账户？立即注册';
                }
            },
            mounted() {
                // 检查是否已登录，如果已登录则直接跳转到检测页面
                if (UserCache.isLoggedIn()) {
                    window.location.href = './detect.html';
                }
            },
            methods: {
                toggleMode() {
                    this.isRegister = !this.isRegister;
                    // 清空表单
                    this.loginForm = { username: '', password: '' };
                    this.registerForm = { username: '', password: '', realName: '' };
                },
                
                async handleLogin() {
                    if (!this.loginForm.username || !this.loginForm.password) {
                        ElMessage.error('请输入用户名和密码');
                        return;
                    }
                    
                    this.loginLoading = true;
                    try {
                        const response = await fetch(API_CONFIG.baseURL + API_CONFIG.endpoints.login, {
                            method: 'POST',
                            headers: {
                                'Content-Type': 'application/json'
                            },
                            body: JSON.stringify(this.loginForm)
                        });
                        
                        const result = await response.json();
                        if (result.code === 200) {
                            ElMessage.success('登录成功');
                            // 保存用户信息到缓存
                            UserCache.saveUser(result.data.user);
                            // 跳转到检测页面
                            window.location.href = './detect.html';
                        } else {
                            ElMessage.error(result.message);
                        }
                    } catch (error) {
                        ElMessage.error('登录失败：' + error.message);
                    } finally {
                        this.loginLoading = false;
                    }
                },
                
                async handleRegister() {
                    if (!this.registerForm.username || !this.registerForm.password) {
                        ElMessage.error('请输入用户名和密码');
                        return;
                    }
                    
                    if (this.registerForm.username.length < 3) {
                        ElMessage.error('用户名至少3位');
                        return;
                    }
                    
                    if (this.registerForm.password.length < 6) {
                        ElMessage.error('密码至少6位');
                        return;
                    }
                    
                    this.registerLoading = true;
                    try {
                        const response = await fetch(API_CONFIG.baseURL + API_CONFIG.endpoints.register, {
                            method: 'POST',
                            headers: {
                                'Content-Type': 'application/json'
                            },
                            body: JSON.stringify(this.registerForm)
                        });
                        
                        const result = await response.json();
                        if (result.code === 200) {
                            ElMessage.success('注册成功，请登录');
                            // 切换到登录模式并填充用户名
                            this.isRegister = false;
                            this.loginForm.username = this.registerForm.username;
                            this.registerForm = { username: '', password: '', realName: '' };
                        } else {
                            ElMessage.error(result.message);
                        }
                    } catch (error) {
                        ElMessage.error('注册失败：' + error.message);
                    } finally {
                        this.registerLoading = false;
                    }
                }
            }
        }).use(ElementPlus).mount('#app');
    </script>
</body>
</html>
